<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wammy's Registry - Index 0</title>
    <meta name="theme-color" content="#050505">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="terminal">
    <div class="output" id="boot"></div>
    <div id="history"></div>
    <div class="input-area">
        <span class="prompt">L_System:\></span>
        <input type="text" id="cmdInput" autofocus spellcheck="false" autocomplete="off">
    </div>
</div>

<script src="db/drafts.js"></script>
<script src="db/logs.js"></script>
<script src="db/analysis.js"></script>
<script src="db/philosophy.js"></script>

<script>
    // === 数据库 ===
    const Global_DB = {
        'Drafts': typeof DB_Drafts !== 'undefined' ? DB_Drafts : [],
        'Logs': typeof DB_Logs !== 'undefined' ? DB_Logs : [],
        'Analysis': typeof DB_Analysis !== 'undefined' ? DB_Analysis : [],
        'Philosophy': typeof DB_Philosophy !== 'undefined' ? DB_Philosophy : []
    };

    const historyEl = document.getElementById('history');
    const inputEl = document.getElementById('cmdInput');
    const terminalEl = document.getElementById('terminal');
    let isTyping = false; // 防止打字机期间重复输入

    // === 开机序列动画 ===
    async function bootSequence() {
        const bootEl = document.getElementById('boot');

        // ASCII Logo
        const logo = `
    ██╗         
    ██║         
    ██║         
    ██║         
    ███████╗    
    ╚══════╝    
        `;
        const logoDiv = document.createElement('div');
        logoDiv.style.color = '#00cc36';
        logoDiv.style.textShadow = '0 0 10px rgba(0, 204, 54, 0.4)';
        logoDiv.style.whiteSpace = 'pre';
        logoDiv.style.fontFamily = 'inherit';
        logoDiv.style.fontSize = '0.7rem';
        logoDiv.style.lineHeight = '1.2';
        logoDiv.style.marginBottom = '16px';
        logoDiv.style.opacity = '0';
        logoDiv.textContent = logo;
        bootEl.appendChild(logoDiv);

        // Logo 淡入
        await sleep(300);
        logoDiv.style.transition = 'opacity 1.2s ease';
        logoDiv.style.opacity = '1';
        await sleep(1500);

        const lines = [
            { text: '[SYSTEM] Wammy\'s House Central Server v4.0.5... Connected.', cls: '' },
            { text: '[AUTH] User: L_Lawliet', cls: '' },
            { text: '[WARNING!!!] BIOMETRIC_SIGNAL_LOST.', cls: 'system-warn' },
            { text: 'If you are reading this,', cls: 'system-warn' },
            { text: 'I am already dead.', cls: 'system-warn' },
            { text: '>> Decrypting \'Legacy\' archive for the successor...', cls: 'system-warn' },
            { text: '[INFO] Type \'ls\' to list folders or \'help\' for guidance.', cls: '' },
            { text: '-----------------------------------------------------------', cls: '' }
        ];

        for (const line of lines) {
            const div = document.createElement('div');
            if (line.cls) div.className = line.cls;
            bootEl.appendChild(div);
            await typeTextNode(div, line.text, 8);
            await sleep(150);
        }
        inputEl.focus();
    }

    // === 核心交互 ===
    inputEl.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const val = this.value.trim();
            if (val === '' || isTyping) return;

            const [cmd, ...args] = val.split(' ');
            const arg = args.join(' ');

            const cmdLine = document.createElement('div');
            cmdLine.className = 'output command-line';
            cmdLine.innerHTML = `<span class="prompt">L_System:\\></span> ${escapeHtml(val)}`;
            historyEl.appendChild(cmdLine);

            handleCommand(cmd.toLowerCase(), arg);
            this.value = '';
            scrollTerminal();
        }
    });

    // === 指令处理器 ===
    function handleCommand(cmd, arg) {
        switch (cmd) {
            case 'help':
                printNormal(
                    "Available commands:\n" +
                    "  ls          List all main directories\n" +
                    "  cd [folder] Enter a directory\n" +
                    "  read [ID]   Access a specific file\n" +
                    "  random      Decrypt a random file\n" +
                    "  who         Display current user identity\n" +
                    "  date        Show system timestamp\n" +
                    "  clear       Reset terminal screen\n" +
                    "  exit        Attempt session termination"
                );
                break;

            case 'ls':
                printNormal("Directories found:\n  /Drafts\n  /Logs\n  /Analysis\n  /Philosophy");
                break;

            case 'cd':
                if (!arg) return printWarn("Usage: cd [Folder_Name]");
                const folderName = arg.charAt(0).toUpperCase() + arg.slice(1).toLowerCase();
                const db = Global_DB[folderName];
                if (db) {
                    let list = `Directory: /${folderName}\n`;
                    db.forEach(f => list += `  > [ID: ${f.id}] ${f.title}\n`);
                    printNormal(list);
                } else {
                    printWarn(`Error: Directory '${arg}' not found.`);
                }
                break;

            case 'read':
                if (!arg) return printWarn("Usage: read [ID]");
                const entry = findEntry(arg);
                if (entry) {
                    printBilingual(entry);
                } else {
                    printWarn(`Error: File ID '${arg}' not recognized or encrypted.`);
                }
                break;

            case 'random':
                const allEntries = Object.values(Global_DB).flat();
                const randomEntry = allEntries[Math.floor(Math.random() * allEntries.length)];
                printNormal(`[RANDOM SELECT]: ${randomEntry.id} - ${randomEntry.title}`);
                printBilingual(randomEntry);
                break;

            case 'clear':
                historyEl.innerHTML = '';
                break;

            case 'who':
                printNormal("[IDENTITY]\n  Alias: L\n  Status: SIGNAL_LOST\n  Clearance: OMEGA\n  Legacy Protocol: ACTIVE");
                break;

            case 'date':
                printNormal(`[SYSTEM TIME] ${new Date().toISOString()}\n[NOTE] Time is relative. Especially for those who no longer experience it.`);
                break;

            case 'exit':
                printWarn("[SYSTEM] Session termination denied.\nThis archive persists beyond its author.\nType 'help' to continue.");
                break;

            case 'sudo':
                printWarn("[AUTH] Root access requires biometric confirmation.\nBIOMETRIC_SIGNAL: NULL. Request denied.");
                break;

            case 'kira':
                printWarn("FATAL ERROR: ACCESS DENIED. SYSTEM LOCKED BY RULE 13.");
                break;

            default:
                printNormal(`Command not found: ${cmd}\nType 'help' for available commands.`);
        }
    }

    // === 查找条目 ===
    function findEntry(id) {
        const normalized = id.toUpperCase();
        for (const key in Global_DB) {
            const found = Global_DB[key].find(f => f.id === normalized);
            if (found) return found;
        }
        return null;
    }

    // === 输出函数 ===
    function printNormal(text) {
        const div = document.createElement('div');
        div.className = 'output';
        div.style.whiteSpace = 'pre-wrap';
        div.style.display = 'block';
        div.textContent = text;
        historyEl.appendChild(div);
        scrollTerminal();
    }

    function printWarn(text) {
        const div = document.createElement('div');
        div.className = 'output system-warn';
        div.style.whiteSpace = 'pre-wrap';
        div.style.display = 'block';
        div.textContent = text;
        historyEl.appendChild(div);
        scrollTerminal();
    }

    // === 打字机（性能优化版）===
    // 使用 textContent 逐字追加，避免 innerHTML 重解析
    async function typeTextNode(element, text, speed) {
        const lines = text.split('\n');
        for (let j = 0; j < lines.length; j++) {
            const line = lines[j];
            for (let i = 0; i < line.length; i++) {
                element.textContent += line.charAt(i);
                // 每 5 个字符滚动一次（减少滚动调用）
                if (i % 5 === 0) scrollTerminal();
                await sleep(speed);
            }
            if (j < lines.length - 1) {
                element.appendChild(document.createElement('br'));
            }
        }
        scrollTerminal();
    }

    async function typeTextNodeZh(element, text, speed) {
        const lines = text.split('\n');
        for (let j = 0; j < lines.length; j++) {
            const line = lines[j];
            // 中文行前加 //
            const prefix = '// ';
            element.textContent += prefix;
            for (let i = 0; i < line.length; i++) {
                element.textContent += line.charAt(i);
                if (i % 3 === 0) scrollTerminal();
                await sleep(speed);
            }
            if (j < lines.length - 1) {
                element.appendChild(document.createElement('br'));
            }
        }
        scrollTerminal();
    }

    // === 双语打印（带打字机） ===
    async function printBilingual(entry) {
        isTyping = true;
        inputEl.disabled = true;
        inputEl.placeholder = 'DECRYPTING...';

        const container = document.createElement('div');
        container.className = 'output';

        const header = document.createElement('div');
        header.className = 'file-header';
        header.textContent = `[DECRYPTING FILE]: ${entry.path}`;
        container.appendChild(header);

        const fileBox = document.createElement('div');
        fileBox.className = 'file-container';

        const enSpan = document.createElement('span');
        enSpan.className = 'lang-en';
        const zhSpan = document.createElement('span');
        zhSpan.className = 'lang-zh';

        fileBox.appendChild(enSpan);
        fileBox.appendChild(zhSpan);
        container.appendChild(fileBox);
        historyEl.appendChild(container);

        scrollTerminal();

        // 执行打字序列
        await typeTextNode(enSpan, entry.content_en, 12);
        await sleep(400);
        await typeTextNodeZh(zhSpan, entry.content_zh, 20);

        // 恢复输入
        inputEl.disabled = false;
        inputEl.placeholder = '';
        inputEl.focus();
        isTyping = false;
        scrollTerminal();
    }

    // === 工具 ===
    function scrollTerminal() {
        terminalEl.scrollTop = terminalEl.scrollHeight;
    }

    function sleep(ms) {
        return new Promise(res => setTimeout(res, ms));
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // === 启动 ===
    bootSequence();
</script>
</body>
</html>
